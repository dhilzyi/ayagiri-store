<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ayagiri SHOP</title>

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="./css/components/order-status.css" />
  </head>
  <body>
    <header class="main-header">
      <h2 data-section-id="1">ダッシュボード</h2>
      <h2 data-section-id="2">注文ステータス</h2>
      <h2>タブレット調子</h2>
      <h2>データベース</h2>
      <h2>設定</h2>
    </header>

    <section class="dashboard" data-section-id="1">
      <div class="row-1">
        <div class="current-status">
          <h3>現在のステータス</h3>
          <div class="current-status-body">
            <div class="current-status-orders">
              <h4>注文の数</h4>
              <h4>4</h4>
            </div>
            <div class="current-status-tablet">
              <h4>オンラインのタブレット</h4>
              <h4>2</h4>
            </div>
          </div>
        </div>
        <div class="today-turnover">
          <h3>今日の売り上げ</h3>
          <h3>￥５０００</h3>
        </div>
      </div>
    </section>

    <section class="order-status active" data-section-id="2">
      <h1>注文情報</h1>

      <div class="summary-box">
        <!-- Using standard POS terms -->
        <p>待機オーダー： <span class="summary-number">2</span> 件</p>
        <p>調理待ちアイテム： <span class="summary-number">4</span> 品</p>
      </div>

      <div class="order-list">
        <!-- Order Card 1 -->
        <div class="order-card" id="order-001">
          <div class="order-header">
            <h2>卓番： 1</h2>
            <!-- Changed from テーブル1 -->
            <span class="time">00:00</span>
          </div>

          <div class="order-content">
            <div class="order-items-box">
              <div class="item">
                <span>てりやきバーガー</span> <span>x 2</span>
              </div>
              <div class="item"><span>ポテト (L)</span> <span>x 1</span></div>
              <div class="item"><span>コーラ</span> <span>x 3</span></div>
            </div>
            <button class="complete-btn" onclick="completeOrder('order-001')">
              完成
            </button>
          </div>
        </div>

        <!-- Order Card 2 -->
        <div class="order-card" id="order-002">
          <div class="order-header">
            <h2>卓番： 2</h2>
            <span class="time">00:05</span>
          </div>

          <div class="order-content">
            <div class="order-items-box">
              <div class="item">
                <span>チーズバーガー</span> <span>x 1</span>
              </div>
            </div>
            <button class="complete-btn" onclick="completeOrder('order-002')">
              完成
            </button>
          </div>
        </div>
      </div>
    </section>
    <script src="./main.js"></script>
  </body>
</html>
