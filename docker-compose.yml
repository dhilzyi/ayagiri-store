# docker-compose.yml
services:
  db:
    image: postgres:16
    env_file: 
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    profiles:
      - tools
    image: ghcr.io/kukymbr/goose-docker:3.27.1
    depends_on:
      db:
        condition: service_healthy
    env_file: 
      - .env
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: ${DB_URL}
    volumes:
      - ./sql/schema:/migrations

  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - db

volumes:
  postgres_data:
    name: ayagiri-postgres-data
