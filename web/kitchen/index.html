<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ayagiri Kitchen</title>

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="./css/components/order-status.css" />
    <link rel="stylesheet" href="./css/components/database.css" />
    <link rel="stylesheet" href="./css/components/popup.css" />
  </head>
  <body>
    <header class="main-header">
      <h2 data-section-id="1">ダッシュボード</h2>
      <h2 data-section-id="2">注文ステータス</h2>
      <h2>タブレット調子</h2>
      <h2 data-section-id="3">データベース</h2>
      <h2>設定</h2>
    </header>

    <section class="dashboard" data-section-id="1">
      <div class="row-1">
        <div class="current-status">
          <h3>現在のステータス</h3>
          <div class="current-status-body">
            <div class="current-status-orders">
              <h4>注文の数</h4>
              <h4>4</h4>
            </div>
            <div class="current-status-tablet">
              <h4>オンラインのタブレット</h4>
              <h4>2</h4>
            </div>
          </div>
        </div>
        <div class="today-turnover">
          <h3>今日の売り上げ</h3>
          <h3>￥５０００</h3>
        </div>
      </div>
    </section>

    <!-- ORDER STATUS SECTIONS-->
    <section class="order-status" data-section-id="2">
      <h1>注文情報</h1>

      <div id="connection-status" class="status-disconnected">
        <span class="status-dot"></span>
        <span class="status-text">接続待ち (Connecting...)</span>
      </div>
      <div class="summary-box">
        <p>待機オーダー： <span class="summary-number">0</span> 件</p>
        <p>調理待ちアイテム： <span class="summary-number">4</span> 品</p>
      </div>

      <div class="order-list">
        <span>現在オーダーはありません。</span>

        <!--     <span class="time" data-created-at="2026-05-25T23:04:59.455242Z" -->
        <!--       >00:00</span -->
        <!--     > -->
        <!--   </div> -->
        <!---->
        <!--   <div class="order-content"> -->
        <!--     <div class="order-items-box"> -->
        <!--       <div class="item"> -->
        <!--         <span>てりやきバーガー</span> <span>x 2</span> -->
        <!--       </div> -->
        <!--       <div class="item"><span>ポテト (L)</span> <span>x 1</span></div> -->
        <!--       <div class="item"><span>コーラ</span> <span>x 3</span></div> -->

        <!--     <button class="complete-btn" onclick="completeOrder('order-001')"> -->
        <!--       完成 -->
        <!--     </button> -->
        <!--   </div> -->
        <!-- </div> -->
      </div>
    </section>

    <!-- DATABASE SECTIONS-->
    <section class="database active" data-section-id="3">
      <div class="database-body">
        <!-- <div class="database-header"> -->
        <!--   <h2>商品</h2> -->
        <!--   <h2>オーだー</h2> -->
        <!-- </div> -->
        <h2>現在は商品テーブルを表示しています。</h2>
        <div class="action">
          <div>
            <label for="database-select">データベースを選択:</label>
            <select name="database-select" id="database-select">
              <option value="products">商品一覧</option>
              <option value="categories">カテゴリー一覧</option>
              <option value="orders">注文一覧</option>
              <option value="order_items">注文品一覧</option>
            </select>
          </div>
          <div class="right">
            <span>アクション:</span>
            <button id="delete-btn">削除</button>
            <button id="edit-btn">変更</button>
            <button id="new-order-btn">+新しい項目を作成</button>
          </div>
        </div>
        <div class="database-pagination-header">
          <div class="left">
            <search>
              <form action="">
                <label for="search-input">検索:</label>
                <input type="search" placeholder="検索する" />
              </form>
            </search>
            <button class="filter-btn">フィ</button>
            <span></span>
          </div>
          <div class="right">
            <label for="result-per-page">1ページあたりの件数</label>
            <select name="result-per-page" id="result-per-page-opt">
              <option value="10">10</option>
              <option value="20">20</option>
            </select>
          </div>
        </div>
        <div class="table-container">
          <table class="database-table">
            <thead>
              <tr>
                <!-- table header filled dynamically -->
              </tr>
            </thead>
            <tbody>
              <!-- table body filled dynamically -->
            </tbody>
          </table>
          <div class="database-pagination-footer">
            <nav class="pagination">
              <button id="pagination-prev">前へ</button>
              <ul class="pagination-items" id="pagination-list">
                <!-- DYNAMIC LIST -->
              </ul>
              <button id="pagination-next">次へ</button>
            </nav>
          </div>
        </div>
      </div>
    </section>

    <!-- POP UP SECTION -->
    <dialog id="create-row">
      <div class="popup-layout">
        <div class="create-popup-header">
          <!-- TODO: Change the h4 title to each action case -->
          <h4>新規商品の追加</h4>
          <p>
            入力された内容は商品一覧に直接追加されます。内容をご確認ください。
          </p>
        </div>
        <form
          class="create-popup-body"
          id="popup-form"
          data-table="products"
          data-action="add"
        >
          <!-- TODO: implement case for other table e.g categories -->
          <div class="input-container"></div>
          <div class="info-post">
            <div class="submit-result">
              <!-- Will be filled dynamically according to the results -->
              <p>ここに送信結果が表示されます。</p>
            </div>
          </div>
        </form>
        <div class="create-popup-footer">
          <button id="popup-cancel-btn">キャンセル</button>
          <button type="submit" form="popup-form">入力する</button>
        </div>
      </div>
    </dialog>
    <script type="module" src="./js/index.js"></script>
  </body>
</html>
