<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ayagiri</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section>
      <div class="app-container">
        <div class="app-header">
          <div class="app-header-item"><h1>注文</h1></div>
          <div class="app-header-item"><h1>会計</h1></div>
          <div class="app-header-item"><h1>注文履歴</h1></div>
        </div>
        <div class="app-body">
          <div class="menu-section">
            <div class="category-bar">
              <div class="category-item"><h3>おすすめ</h3></div>
              <div class="category-item"><h3>焼き物</h3></div>
              <div class="category-item"><h3>サラダ</h3></div>
              <div class="category-item"><h3>ドリンク</h3></div>
              <div class="category-item"><h3>デザート</h3></div>
            </div>
            <div class="product-item">
              <h4>照り焼き</h4>
              <h5>￥1000</h5>
            </div>
          </div>
          <div class="order-section">
            <h2>注文リスト</h2>
            <div class="item-lists">
              <table>
                <tr>
                  <th class="header-name-product">商品名</th>
                  <th class="header-amount">数</th>
                  <th class="header-change-amount">変更</th>
                </tr>
                <tr>
                  <td>照り焼き</td>
                  <td>1</td>
                  <td>
                    <button>-</button>
                    <button>+</button>
                  </td>
                </tr>
              </table>
            </div>
            <div class="footer-order">
              <div class="price-section">
                <h3>合計金額</h3>
                <h2 class="sum-price">￥100.00</h2>
              </div>
              <div class="order-button-section">
                <button id="delete-all-btn">すべて 取り消し</button>
                <button id="order-btn">注文する</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
