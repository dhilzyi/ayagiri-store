<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ayagiri</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components/header.css" />
    <link rel="stylesheet" href="css/components/menu.css" />
    <link rel="stylesheet" href="css/components/order.css" />
    <link rel="stylesheet" href="css/components/button.css" />
    <link rel="stylesheet" href="css/components/popup.css" />
  </head>
  <body>
    <section>
      <div class="app-container">
        <div class="app-header">
          <div class="app-header-item"><h1>注文</h1></div>
          <div class="app-header-item"><h1>会計</h1></div>
          <div class="app-header-item"><h1>注文履歴</h1></div>
        </div>
        <div class="app-body">
          <div class="menu-section">
            <div class="category-bar">
              <div class="category-item active" data-category-id="2">
                <h3>おすすめ</h3>
              </div>
              <div class="category-item" data-category-id="3">
                <h3>焼き物</h3>
              </div>
              <div class="category-item" data-category-id="4">
                <h3>サラダ</h3>
              </div>
              <div class="category-item" data-category-id="5">
                <h3>ドリンク</h3>
              </div>
              <div class="category-item" data-category-id="6">
                <h3>デザート</h3>
              </div>
              <div class="category-item" data-category-id="1">
                <h3>その他</h3>
              </div>
            </div>
            <div class="product-display">
              <div class="product-item">
                <h3>照り焼き</h3>
                <h4>￥1000 <span>(税込)</span></h4>
              </div>
            </div>
          </div>
          <div class="order-section">
            <h2>注文リスト</h2>
            <div class="item-lists">
              <table>
                <thead>
                  <tr>
                    <th class="header-name-product">商品名</th>
                    <th class="header-amount">数</th>
                    <th class="header-change-amount">変更</th>
                  </tr>
                </thead>
                <tbody class="order-list">
                  <!-- this table body is -->
                  <!-- dynamically filled by javascript for ordering items by customer -->
                </tbody>
              </table>
            </div>
            <div class="footer-order">
              <div class="price-section">
                <h3>合計金額</h3>
                <h2 class="sum-price">￥0</h2>
              </div>
              <div class="order-btn-section">
                <button id="delete-all-btn">すべて 取り消し</button>
                <button id="order-btn">注文する</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Overlay and Pop up elements -->
    <div class="overlay" id="overlay"></div>

    <div class="popup" id="del-confirm">
      <div class="popup-header">
        <h3>操作確認</h3>
      </div>
      <div class="popup-body"></div>
      <div class="popup-footer">
        <button id="popup-cancel-btn">キャンセル</button>
        <button id="popup-confirm-btn">確認</button>
      </div>
    </div>

    <div class="popup-order" id="order-confirm">
      <h3>注文の確認</h3>
      <div class="popup-order-body">
        <table>
          <thead>
            <th>商品名</th>
            <th>数</th>
            <th>値段</th>
          </thead>
          <tbody>
            <!-- this table body is -->
            <!-- dynamically filled by javascript for ordered items -->
          </tbody>
        </table>
      </div>
      <div class="popup-order-footer">
        <button id="order-confirm-cancel-btn">キャンセル</button>
        <button id="order-confirm-btn">確定</button>
      </div>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
